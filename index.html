<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CapBall - Tabletop Football</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bungee&family=Russo+One&family=Orbitron:wght@700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body, #root { width: 100%; height: 100%; overflow: hidden; }
      body { background: #0a0a1a; }

      /* Arcade font stacks */
      :root {
        --font-display: 'Bungee', 'Impact', sans-serif;
        --font-hud: 'Russo One', 'Arial Black', sans-serif;
        --font-score: 'Orbitron', 'Russo One', monospace;
        --font-pixel: 'Press Start 2P', monospace;

        --red-team: #E53935;
        --red-dark: #B71C1C;
        --blue-team: #1E88E5;
        --blue-dark: #0D47A1;
        --gold-accent: #FFD740;
        --gold-bright: #FFC107;
        --hud-bg: rgba(10, 12, 30, 0.92);
        --hud-border: rgba(255, 215, 64, 0.35);
      }

      /* Keyframe animations */
      @keyframes goalPulse {
        0% { transform: translate(-50%, -50%) scale(0.3); opacity: 0; }
        50% { transform: translate(-50%, -50%) scale(1.15); opacity: 1; }
        100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      }

      @keyframes goalGlow {
        0%, 100% { text-shadow: 0 0 20px rgba(255,215,0,0.8), 0 0 60px rgba(255,215,0,0.4), 0 4px 8px rgba(0,0,0,0.6); }
        50% { text-shadow: 0 0 40px rgba(255,215,0,1), 0 0 80px rgba(255,215,0,0.6), 0 4px 8px rgba(0,0,0,0.6); }
      }

      @keyframes activeTeamPulse {
        0%, 100% { box-shadow: 0 0 8px rgba(255,215,64,0.3), inset 0 1px 0 rgba(255,255,255,0.15); }
        50% { box-shadow: 0 0 20px rgba(255,215,64,0.6), inset 0 1px 0 rgba(255,255,255,0.15); }
      }

      @keyframes statusBlink {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.7; }
      }

      @keyframes buttonBounce {
        0% { transform: scale(1); }
        50% { transform: scale(0.95); }
        100% { transform: scale(1); }
      }

      @keyframes slideDown {
        from { transform: translateY(-20px); opacity: 0; }
        to { transform: translateY(0); opacity: 1; }
      }

      @keyframes fadeIn {
        from { opacity: 0; }
        to { opacity: 1; }
      }

      @keyframes scorePop {
        0% { transform: scale(1); }
        30% { transform: scale(1.4); color: #FFD740; }
        100% { transform: scale(1); }
      }

      @keyframes titleFloat {
        0%, 100% { transform: translateY(0px); }
        50% { transform: translateY(-6px); }
      }

      @keyframes pressStart {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.3; }
      }

      @keyframes vignetteBreath {
        0%, 100% { opacity: 0.7; }
        50% { opacity: 0.85; }
      }

      /* Global arcade button hover / active effects */
      .arcade-btn {
        transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.15s ease !important;
      }
      .arcade-btn:hover {
        filter: brightness(1.15) !important;
        transform: translateY(-1px) !important;
      }
      .arcade-btn:active {
        transform: translateY(3px) !important;
        filter: brightness(0.95) !important;
      }

      .arcade-link {
        transition: all 0.15s ease !important;
      }
      .arcade-link:hover {
        color: rgba(255,215,64,0.8) !important;
        border-color: rgba(255,215,64,0.4) !important;
        background: rgba(255,215,64,0.08) !important;
        transform: translateY(-1px) !important;
      }
      .arcade-link:active {
        transform: translateY(1px) !important;
        color: #FFD740 !important;
      }

      .pill-btn {
        transition: all 0.12s ease !important;
      }
      .pill-btn:hover {
        filter: brightness(1.2) !important;
        transform: scale(1.05) !important;
      }

      .cam-btn {
        transition: transform 0.08s ease, filter 0.15s ease !important;
      }
      .cam-btn:hover {
        filter: brightness(1.25) !important;
        transform: translateY(-1px) !important;
      }
      .cam-btn:active {
        transform: translateY(1px) !important;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
